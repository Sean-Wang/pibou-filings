name: Publish Python Package

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: "Which index to publish to"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

# Trusted Publishing (OIDC) requires id-token write at the job level. No
# long-lived API tokens needed — configure the publisher on PyPI/TestPyPI to
# accept OIDC from this repo + workflow + environment.
#
# See: https://docs.pypi.org/trusted-publishers/

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          package_version="$(python - <<'PY'
          from piboufilings._version import __version__

          print(__version__)
          PY
          )"
          release_tag="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$release_tag" ]; then
            echo "Package version ($package_version) does not match release tag (${GITHUB_REF_NAME})." >&2
            echo "Create a release tag that matches piboufilings._version.__version__, e.g. v$package_version." >&2
            exit 1
          fi

      - name: Build the package
        run: python -m build

      - name: Verify distribution metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/

  publish-testpypi:
    name: Publish → TestPyPI
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch'
      && github.event.inputs.environment == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/piboufilings
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish → PyPI
    needs: build
    if: >-
      github.event_name == 'release'
      || (github.event_name == 'workflow_dispatch'
          && github.event.inputs.environment == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/piboufilings
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
