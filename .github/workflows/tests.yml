name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Also run live-SEC integration tests"
        type: boolean
        default: false
  schedule:
    # Nightly integration run at 05:00 UTC — outside US business hours so
    # we put minimal load on EDGAR.
    - cron: "0 5 * * *"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[lint,test]"

      - name: Ruff (lint)
        run: ruff check piboufilings tests

      - name: Ruff (format check)
        run: ruff format --check piboufilings tests

      # mypy runs for signal only. We have ~30 existing type errors that will
      # be worked down in follow-up PRs; do not gate CI on them yet.
      - name: Mypy (report-only)
        continue-on-error: true
        run: mypy piboufilings

  unit:
    name: Unit — Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          pytest -m "not integration" --tb=short \
            --cov=piboufilings \
            --cov-report=term-missing \
            --cov-fail-under=65

  integration:
    name: Integration (live SEC)
    # Opt-in only: nightly schedule, or manually dispatched with the flag set.
    # PRs and normal pushes do NOT hit live SEC.
    if: >-
      github.event_name == 'schedule'
      || (github.event_name == 'workflow_dispatch'
          && github.event.inputs.run_integration == 'true')
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run integration tests
        run: pytest -m integration --tb=short
